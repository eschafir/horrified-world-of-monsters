<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#14100a"/>
  <!-- Tilted hat -->
  <rect x="28" y="12" width="38" height="16" rx="3" fill="#2a2010" transform="rotate(-8 47 20)"/>
  <rect x="22" y="28" width="50" height="6" rx="3" fill="#3a3020" transform="rotate(-8 47 31)"/>
  <!-- Rosy face (slightly tilted) -->
  <circle cx="50" cy="46" r="19" fill="#c89060"/>
  <!-- Rosy cheeks -->
  <circle cx="38" cy="50" r="7" fill="rgba(220,70,50,0.45)"/>
  <circle cx="62" cy="50" r="7" fill="rgba(220,70,50,0.45)"/>
  <!-- Mug body -->
  <rect x="28" y="72" width="34" height="24" rx="5" fill="#7a4a1a"/>
  <!-- Mug handle -->
  <path d="M62 77 Q76 77 76 84 Q76 91 62 91" fill="none" stroke="#7a4a1a" stroke-width="6"/>
  <!-- Foam -->
