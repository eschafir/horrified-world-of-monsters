<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0e1a10"/>
  <!-- Robe body -->
  <rect x="32" y="57" width="36" height="38" rx="4" fill="#8a1a2a"/>
  <!-- Arms stretched rigidly forward -->
  <rect x="6" y="56" width="28" height="11" rx="5" fill="#8a1a2a"/>
  <rect x="66" y="56" width="28" height="11" rx="5" fill="#8a1a2a"/>
  <!-- Head -->
  <circle cx="50" cy="40" r="21" fill="#bece90"/>
  <!-- Talisman on forehead -->
  <rect x="41" y="22" width="18" height="14" rx="2" fill="#ffd533"/>
  <line x1="43" y1="26" x2="57" y2="26" stroke="#8a1a2a" stroke-width="1.5"/>
  <line x1="43" y1="29" x2="57" y2="29" stroke="#8a1a2a" stroke-width="1.5"/>
  <line x1="43" y1="32" x2="57" y2="32" stroke="#8a1a2a" stroke-width="1.5"/>
  <!-- Blank staring eyes -->
  <circle cx="42" cy="43" r="5.5" fill="#ffffff"/>
  <circle cx="58" cy="43" r="5.5" fill="#ffffff"/>
  <!-- Fangs -->
  <line x1="46" y1="55" x2="44" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="55" x2="56" y2="60" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
